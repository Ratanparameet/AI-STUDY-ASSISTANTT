<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — AI Study Assistant</title>
  <meta name="description" content="Sign in to your AI Study Assistant account">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <div class="bg-mesh"></div>
  <div class="toast-container" id="toast-container"></div>

  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">🎓</div>
      <h1>Welcome Back</h1>
      <p class="auth-subtitle">Sign in to continue your study journey</p>

      <form id="login-form" autocomplete="on">
        <div class="form-group">
          <label class="form-label" for="login-email">Email or Username</label>
          <div class="input-icon-wrapper">
            <span class="input-icon">📧</span>
            <input type="text" class="form-input" id="login-email" name="email" placeholder="you@example.com" required autocomplete="username">
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="login-password">Password</label>
          <div class="password-wrapper">
            <div class="input-icon-wrapper">
              <span class="input-icon">🔒</span>
              <input type="password" class="form-input" id="login-password" name="password" placeholder="Enter your password" required autocomplete="current-password">
            </div>
            <button type="button" class="password-toggle" id="toggle-password" aria-label="Toggle password visibility">👁️</button>
          </div>
        </div>

        <div class="remember-row">
          <label>
            <input type="checkbox" id="remember-me">
            Remember me
          </label>
          <a href="/forgot-password" style="color:var(--accent);font-size:0.85rem">Forgot password?</a>
        </div>

        <button type="submit" class="btn btn-primary btn-lg" style="width:100%" id="login-submit-btn">
          Sign In
        </button>
      </form>

      <div class="auth-footer">
        Don't have an account? <a href="/signup">Create one</a>
      </div>
    </div>
  </div>

  <script>
    // Redirect if already logged in
    if (localStorage.getItem('auth_token')) {
      window.location.href = '/';
    }

    // Toggle password visibility
    document.getElementById('toggle-password').addEventListener('click', function() {
      const pwd = document.getElementById('login-password');
      pwd.type = pwd.type === 'password' ? 'text' : 'password';
      this.textContent = pwd.type === 'password' ? '👁️' : '🙈';
    });

    // Toast helper
    function showToast(message, type = 'info') {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = 'toast ' + type;
      toast.innerHTML = `<span>${message}</span><button class="toast-close" onclick="this.parentElement.remove()">✕</button>`;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 4000);
    }

    // Login form
    document.getElementById('login-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      const btn = document.getElementById('login-submit-btn');
      btn.disabled = true;
      btn.textContent = 'Signing in...';

      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      const remember = document.getElementById('remember-me').checked;

      try {
        const res = await fetch('/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email_or_username: email, password: password, remember_me: remember })
        });
        const data = await res.json();

        if (res.ok && data.success) {
          localStorage.setItem('auth_token', data.token);
          localStorage.setItem('username', data.username);
          localStorage.setItem('user_email', data.email);
          showToast('Login successful! Redirecting...', 'success');
          setTimeout(() => window.location.href = '/', 600);
        } else {
          showToast(data.detail || 'Invalid credentials', 'error');
        }
      } catch (err) {
        showToast('Could not reach server. Is the backend running?', 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
