<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password — AI Study Assistant</title>
  <meta name="description" content="Reset your AI Study Assistant password">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <div class="bg-mesh"></div>
  <div class="toast-container" id="toast-container"></div>

  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">🔑</div>

      <!-- Step 1: Request Reset Code -->
      <div id="step-request">
        <h1>Forgot Password</h1>
        <p class="auth-subtitle">Enter your registered email to receive a reset code</p>

        <form id="request-form">
          <div class="form-group">
            <label class="form-label" for="reset-email">Email Address</label>
            <input type="email" class="form-input" id="reset-email" placeholder="you@example.com" required>
          </div>
          <button type="submit" class="btn btn-primary btn-lg" style="width:100%" id="request-btn">Send Reset Code</button>
        </form>

        <div class="auth-footer">
          <a href="/login">← Back to Login</a>
        </div>
      </div>

      <!-- Step 2: Enter Code & New Password -->
      <div id="step-reset" style="display:none">
        <h1>Reset Password</h1>
        <p class="auth-subtitle">Enter the code and your new password</p>

        <div id="code-display" style="text-align:center;margin-bottom:24px;padding:16px;background:var(--accent-light);border-radius:var(--radius);font-family:var(--font-display);font-size:1.3rem;font-weight:700;color:var(--accent)"></div>

        <form id="reset-form">
          <div class="form-group">
            <label class="form-label" for="reset-code">Reset Code</label>
            <input type="text" class="form-input" id="reset-code" placeholder="Enter 6-digit code" required maxlength="6" style="text-align:center;font-size:1.2rem;letter-spacing:0.3em">
          </div>

          <div class="form-group">
            <label class="form-label" for="new-password">New Password</label>
            <div class="password-wrapper">
              <input type="password" class="form-input" id="new-password" placeholder="Min 8 chars, uppercase, number, symbol" required>
              <button type="button" class="password-toggle" id="toggle-new-pwd">👁️</button>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" for="confirm-new-password">Confirm New Password</label>
            <input type="password" class="form-input" id="confirm-new-password" placeholder="Re-enter new password" required>
          </div>

          <button type="submit" class="btn btn-primary btn-lg" style="width:100%" id="reset-btn">Reset Password</button>
        </form>

        <div class="auth-footer">
          <a href="/login">← Back to Login</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    function showToast(message, type = 'info') {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = 'toast ' + type;
      toast.innerHTML = `<span>${message}</span><button class="toast-close" onclick="this.parentElement.remove()">✕</button>`;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 4000);
    }

    let resetEmail = '';

    document.getElementById('toggle-new-pwd').addEventListener('click', function() {
      const f = document.getElementById('new-password');
      f.type = f.type === 'password' ? 'text' : 'password';
      this.textContent = f.type === 'password' ? '👁️' : '🙈';
    });

    // Step 1: Request reset code
    document.getElementById('request-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      const btn = document.getElementById('request-btn');
      btn.disabled = true;
      btn.textContent = 'Sending...';
      resetEmail = document.getElementById('reset-email').value.trim();

      try {
        const res = await fetch('/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: resetEmail })
        });
        const data = await res.json();

        if (res.ok && data.success) {
          document.getElementById('step-request').style.display = 'none';
          document.getElementById('step-reset').style.display = 'block';
          document.getElementById('code-display').textContent = 'Your code: ' + data.code;
          showToast('Reset code generated! Enter it below.', 'success');
        } else {
          showToast(data.detail || 'Email not found', 'error');
        }
      } catch (err) {
        showToast('Could not reach server', 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Send Reset Code';
      }
    });

    // Step 2: Reset password
    document.getElementById('reset-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      const newPwd = document.getElementById('new-password').value;
      const confirmPwd = document.getElementById('confirm-new-password').value;

      if (newPwd !== confirmPwd) {
        showToast('Passwords do not match', 'error');
        return;
      }

      const btn = document.getElementById('reset-btn');
      btn.disabled = true;
      btn.textContent = 'Resetting...';

      try {
        const res = await fetch('/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: resetEmail,
            code: document.getElementById('reset-code').value.trim(),
            new_password: newPwd
          })
        });
        const data = await res.json();

        if (res.ok && data.success) {
          showToast('Password reset successfully! Redirecting to login...', 'success');
          setTimeout(() => window.location.href = '/login', 1500);
        } else {
          showToast(data.detail || 'Reset failed', 'error');
        }
      } catch (err) {
        showToast('Could not reach server', 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Reset Password';
      }
    });
  </script>
</body>
</html>
